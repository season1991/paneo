<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 多开浏览器 — 分屏对比原型</title>
  <style>
    /* =========================================================
       Tokens — Tech / utility direction
       ========================================================= */
    :root {
      --bg:        oklch(97% 0.004 250);
      --surface:   oklch(100% 0 0);
      --fg:        oklch(20% 0.018 250);
      --muted:     oklch(50% 0.016 250);
      --border:    oklch(89% 0.006 250);
      --accent:    oklch(58% 0.16 145);
      --accent-dim: oklch(58% 0.16 145 / 0.12);
      --danger:    oklch(55% 0.22 25);
      --warn:      oklch(68% 0.16 85);
      --shell:     oklch(16% 0.012 250);

      /* AI brand accents */
      --ai-chatgpt:  oklch(55% 0.16 145);
      --ai-claude:   oklch(55% 0.14 60);
      --ai-gemini:   oklch(56% 0.18 250);
      --ai-deepseek: oklch(55% 0.16 250);

      --font-body:  -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      --font-mono:  'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;

      --r:   8px;
      --r-lg: 12px;
      --gap: 10px;
      --header-h: 52px;
      --input-h:  68px;
    }

    /* =========================================================
       Reset
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font: 13px/1.5 var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* =========================================================
       App shell
       ========================================================= */
    .app {
      display: grid;
      grid-template-rows: var(--header-h) 1fr var(--input-h);
      height: 100vh;
      gap: 0;
    }

    /* =========================================================
       Header
       ========================================================= */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 3px oklch(0% 0 0 / 0.04);
      z-index: 10;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.01em;
      color: var(--fg);
      white-space: nowrap;
    }
    .header-brand svg { flex-shrink: 0; }
    .header-sep {
      width: 1px;
      height: 24px;
      background: var(--border);
    }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .layout-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: var(--surface);
      color: var(--muted);
      font: 12px/1 var(--font-mono);
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .layout-btn:hover {
      border-color: var(--accent);
      color: var(--fg);
    }
    .layout-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }
    .header-spacer { flex: 1; }
    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font: 11px/1 var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border: none;
      border-radius: var(--r);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .icon-btn:hover {
      background: var(--accent-dim);
      color: var(--fg);
    }

    /* =========================================================
       Grid
       ========================================================= */
    .grid {
      display: grid;
      gap: var(--gap);
      padding: var(--gap);
      transition: grid-template-columns 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

    /* =========================================================
       Panel — mini browser chrome
       ========================================================= */
    .panel[data-ai="chatgpt"]  { --panel-accent: var(--ai-chatgpt); }
    .panel[data-ai="claude"]   { --panel-accent: var(--ai-claude); }
    .panel[data-ai="gemini"]   { --panel-accent: var(--ai-gemini); }
    .panel[data-ai="deepseek"] { --panel-accent: var(--ai-deepseek); }
    .panel {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      min-width: 0;
      transition: box-shadow 0.2s;
    }
    .panel:hover {
      box-shadow: 0 4px 16px oklch(0% 0 0 / 0.08);
      border-color: oklch(from var(--panel-accent, var(--border)) l c h / 0.3);
    }
    .panel-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 38px;
      padding: 0 12px;
      background: oklch(97% 0.003 250);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      border-top: 2px solid var(--panel-accent, var(--border));
    }
    .panel-dots {
      display: flex;
      gap: 5px;
    }
    .panel-dots span {
      width: 9px; height: 9px;
      border-radius: 50%;
      border: 1px solid oklch(0% 0 0 / 0.08);
    }
    .panel-dots span:nth-child(1) { background: oklch(70% 0.14 25); }
    .panel-dots span:nth-child(2) { background: oklch(75% 0.14 90); }
    .panel-dots span:nth-child(3) { background: oklch(68% 0.16 145); }
    .panel-url {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 24px;
      padding: 0 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font: 11px/1 var(--font-mono);
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .panel-url svg { flex-shrink: 0; color: var(--accent); }
    .panel-actions {
      display: flex;
      gap: 2px;
    }
    .panel-actions button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px; height: 24px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .panel-actions button:hover {
      background: oklch(0% 0 0 / 0.06);
      color: var(--fg);
    }

    /* =========================================================
       Chat content inside panel
       ========================================================= */
    .panel-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 14px;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .panel-chat::-webkit-scrollbar { width: 5px; }
    .panel-chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .panel-chat::-webkit-scrollbar-track { background: transparent; }

    .msg {
      display: flex;
      gap: 8px;
      max-width: 92%;
      animation: msgIn 0.3s cubic-bezier(0.2, 0, 0, 1);
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar {
      width: 26px; height: 26px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      font-weight: 600;
    }
    .msg.assistant .msg-avatar {
      background: oklch(from var(--panel-accent, var(--accent)) l c h / 0.14);
      color: var(--panel-accent, var(--accent));
    }
    .msg.user .msg-avatar {
      background: oklch(55% 0.12 250 / 0.12);
      color: oklch(40% 0.08 250);
    }
    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .msg-text {
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12.5px;
      line-height: 1.55;
    }
    .msg.assistant .msg-text {
      background: oklch(96% 0.003 250);
      border: 1px solid var(--border);
      color: var(--fg);
    }
    .msg.user .msg-text {
      background: var(--accent);
      color: oklch(99% 0 0);
      border: none;
    }
    .msg-meta {
      font: 10px/1 var(--font-mono);
      color: var(--muted);
      padding: 0 4px;
    }
    .msg.user .msg-meta { text-align: right; }

    /* typing indicator */
    .typing-indicator {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      max-width: 92%;
    }
    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: oklch(96% 0.003 250);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: dotPulse 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dotPulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* panel muted state */
    .panel-muted {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .panel-muted svg { opacity: 0.4; }
    .panel-muted span {
      font: 11px/1 var(--font-mono);
      letter-spacing: 0.04em;
    }

    /* =========================================================
       Unified input bar
       ========================================================= */
    .input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .input-bar-label {
      font: 10px/1 var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .input-wrap input {
      flex: 1;
      border: none;
      background: transparent;
      font: 13px/1 var(--font-body);
      color: var(--fg);
      outline: none;
    }
    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap .input-hint {
      font: 10px/1 var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.06em;
      white-space: nowrap;
      user-select: none;
    }
    .send-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 40px;
      padding: 0 20px;
      border: none;
      border-radius: var(--r);
      background: var(--accent);
      color: oklch(99% 0 0);
      font: 12px/1 var(--font-body);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .send-btn:hover {
      filter: brightness(1.08);
      box-shadow: 0 2px 8px oklch(58% 0.16 145 / 0.3);
    }
    .send-btn:active { transform: scale(0.97); }
    .send-btn.sending {
      opacity: 0.7;
      pointer-events: none;
    }

    /* quick actions */
    .quick-actions {
      display: flex;
      gap: 4px;
    }
    .quick-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* =========================================================
       Sent flash animation
       ========================================================= */
    @keyframes sentFlash {
      0%   { box-shadow: inset 0 0 0 2px var(--accent); }
      100% { box-shadow: inset 0 0 0 2px transparent; }
    }
    .panel.sent-flash {
      animation: sentFlash 0.8s ease-out;
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
        AI 多开浏览器
      </div>
      <div class="header-sep"></div>
      <div class="header-controls">
        <button class="layout-btn active" data-cols="2" onclick="setLayout(2)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="18" rx="1"/><rect x="13" y="3" width="8" height="18" rx="1"/></svg>
          2 列
        </button>
        <button class="layout-btn" data-cols="3" onclick="setLayout(3)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="5.5" height="18" rx="1"/><rect x="9.25" y="3" width="5.5" height="18" rx="1"/><rect x="16.5" y="3" width="5.5" height="18" rx="1"/></svg>
          3 列
        </button>
      </div>
      <div class="header-spacer"></div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span id="panel-count">4 个 AI 已连接</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="添加面板">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="icon-btn" title="设置">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- ── Panel grid ── -->
    <div class="grid cols-2" id="grid">

      <!-- Panel 1: ChatGPT -->
      <div class="panel" data-ai="chatgpt">
        <div class="panel-bar">
          <div class="panel-dots"><span></span><span></span><span></span></div>
          <div class="panel-url">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            chat.openai.com
          </div>
          <div class="panel-actions">
            <button title="刷新"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
            <button title="展开"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
          </div>
        </div>
        <div class="panel-chat" id="chat-chatgpt">
          <div class="msg assistant">
            <div class="msg-avatar">G</div>
            <div class="msg-body">
              <div class="msg-text">你好！我是 ChatGPT，有什么可以帮你的？</div>
              <div class="msg-meta">ChatGPT · 就绪</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Panel 2: Claude -->
      <div class="panel" data-ai="claude">
        <div class="panel-bar">
          <div class="panel-dots"><span></span><span></span><span></span></div>
          <div class="panel-url">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            claude.ai
          </div>
          <div class="panel-actions">
            <button title="刷新"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
            <button title="展开"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
          </div>
        </div>
        <div class="panel-chat" id="chat-claude">
          <div class="msg assistant">
            <div class="msg-avatar">C</div>
            <div class="msg-body">
              <div class="msg-text">你好，我是 Claude。有什么我可以帮忙的吗？</div>
              <div class="msg-meta">Claude · 就绪</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Panel 3: Gemini -->
      <div class="panel" data-ai="gemini">
        <div class="panel-bar">
          <div class="panel-dots"><span></span><span></span><span></span></div>
          <div class="panel-url">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            gemini.google.com
          </div>
          <div class="panel-actions">
            <button title="刷新"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
            <button title="展开"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
          </div>
        </div>
        <div class="panel-chat" id="chat-gemini">
          <div class="msg assistant">
            <div class="msg-avatar">✦</div>
            <div class="msg-body">
              <div class="msg-text">Hi! I'm Gemini. How can I help you today?</div>
              <div class="msg-meta">Gemini · Ready</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Panel 4: DeepSeek -->
      <div class="panel" data-ai="deepseek">
        <div class="panel-bar">
          <div class="panel-dots"><span></span><span></span><span></span></div>
          <div class="panel-url">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            chat.deepseek.com
          </div>
          <div class="panel-actions">
            <button title="刷新"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
            <button title="展开"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
          </div>
        </div>
        <div class="panel-chat" id="chat-deepseek">
          <div class="msg assistant">
            <div class="msg-avatar">D</div>
            <div class="msg-body">
              <div class="msg-text">你好，我是 DeepSeek，随时为你服务。</div>
              <div class="msg-meta">DeepSeek · 就绪</div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- ── Unified input bar ── -->
    <div class="input-bar">
      <span class="input-bar-label">统一输入</span>
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="unified-input" placeholder="输入问题，同时发送到所有 AI..." autocomplete="off" />
        <span class="input-hint">Enter ↵</span>
      </div>
      <div class="quick-actions">
        <button class="quick-btn" title="清空所有对话" onclick="clearAll()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendToAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        发送
      </button>
    </div>

  </div>

  <script>
    /* ── State ── */
    let currentCols = 2;

    /* ── Layout switch ── */
    function setLayout(cols) {
      currentCols = cols;
      const grid = document.getElementById('grid');
      grid.classList.remove('cols-2', 'cols-3');
      grid.classList.add('cols-' + cols);

      document.querySelectorAll('.layout-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.cols) === cols);
      });

      // Update panel count display
      const count = document.querySelectorAll('.panel').length;
      document.getElementById('panel-count').textContent = count + ' 个 AI 已连接';
    }

    /* ── AI response simulation ── */
    const responses = {
      chatgpt: [
        '这是一个很好的问题。让我从几个角度来分析...',
        '根据我的理解，这个问题的核心在于...',
        '我来给你一个结构化的回答：',
        '这个问题可以从技术和实践两个层面来看。'
      ],
      claude: [
        '这是个有趣的问题，让我仔细思考一下。',
        '我认为可以从以下几个维度来理解这个问题：',
        '让我尝试用一个清晰的框架来回答。',
        '这个问题涉及多个层面，我来逐一展开。'
      ],
      gemini: [
        'Great question! Let me think about this...',
        'Here\'s my take on this topic:',
        'I\'d approach this from a few different angles.',
        'Let me break this down for you.'
      ],
      deepseek: [
        '好的，我来为你详细解答。',
        '这是一个值得深入探讨的话题。',
        '让我从数据和逻辑的角度来分析。',
        '以下是我的分析思路：'
      ]
    };

    function getRandomResponse(ai) {
      const pool = responses[ai] || responses.chatgpt;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    /* ── Send message to all panels ── */
    function sendToAll() {
      const input = document.getElementById('unified-input');
      const text = input.value.trim();
      if (!text) return;

      const sendBtn = document.getElementById('send-btn');
      sendBtn.classList.add('sending');

      const panels = document.querySelectorAll('.panel');
      let delay = 0;

      panels.forEach(panel => {
        const ai = panel.dataset.ai;
        const chatEl = document.getElementById('chat-' + ai);
        if (!chatEl) return;

        // Flash panel
        panel.classList.remove('sent-flash');
        void panel.offsetWidth; // reflow
        panel.classList.add('sent-flash');

        // Add user message
        setTimeout(() => {
          const userMsg = document.createElement('div');
          userMsg.className = 'msg user';
          userMsg.innerHTML = `
            <div class="msg-avatar">你</div>
            <div class="msg-body">
              <div class="msg-text">${escapeHtml(text)}</div>
              <div class="msg-meta">已发送</div>
            </div>
          `;
          chatEl.appendChild(userMsg);
          chatEl.scrollTop = chatEl.scrollHeight;

          // Add typing indicator
          const typing = document.createElement('div');
          typing.className = 'typing-indicator';
          typing.id = 'typing-' + ai;
          typing.innerHTML = `
            <div class="msg-avatar" style="background:var(--accent-dim);color:var(--accent);font-weight:600;">${ai === 'gemini' ? '✦' : ai.charAt(0).toUpperCase()}</div>
            <div class="typing-dots"><span></span><span></span><span></span></div>
          `;
          chatEl.appendChild(typing);
          chatEl.scrollTop = chatEl.scrollHeight;
        }, delay);

        // Replace typing with response
        const responseDelay = 800 + Math.random() * 1200;
        setTimeout(() => {
          const typingEl = document.getElementById('typing-' + ai);
          if (typingEl) typingEl.remove();

          const aiMsg = document.createElement('div');
          aiMsg.className = 'msg assistant';
          aiMsg.innerHTML = `
            <div class="msg-avatar">${ai === 'gemini' ? '✦' : ai.charAt(0).toUpperCase()}</div>
            <div class="msg-body">
              <div class="msg-text">${getRandomResponse(ai)}</div>
              <div class="msg-meta">${ai === 'chatgpt' ? 'ChatGPT' : ai === 'claude' ? 'Claude' : ai === 'gemini' ? 'Gemini' : 'DeepSeek'} · ${new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'})}</div>
            </div>
          `;
          chatEl.appendChild(aiMsg);
          chatEl.scrollTop = chatEl.scrollHeight;
        }, delay + responseDelay);

        delay += 100;
      });

      // Reset input
      setTimeout(() => {
        input.value = '';
        sendBtn.classList.remove('sending');
        input.focus();
      }, 200);
    }

    /* ── Clear all chats ── */
    function clearAll() {
      const greetings = {
        chatgpt: { avatar: 'G', name: 'ChatGPT', text: '你好！我是 ChatGPT，有什么可以帮你的？' },
        claude:  { avatar: 'C', name: 'Claude',  text: '你好，我是 Claude。有什么我可以帮忙的吗？' },
        gemini:  { avatar: '✦', name: 'Gemini',  text: 'Hi! I\'m Gemini. How can I help you today?' },
        deepseek:{ avatar: 'D', name: 'DeepSeek', text: '你好，我是 DeepSeek，随时为你服务。' }
      };

      Object.keys(greetings).forEach(ai => {
        const chatEl = document.getElementById('chat-' + ai);
        if (!chatEl) return;
        const g = greetings[ai];
        chatEl.innerHTML = `
          <div class="msg assistant">
            <div class="msg-avatar">${g.avatar}</div>
            <div class="msg-body">
              <div class="msg-text">${g.text}</div>
              <div class="msg-meta">${g.name} · 就绪</div>
            </div>
          </div>
        `;
      });
    }

    /* ── Helpers ── */
    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    /* ── Keyboard ── */
    document.getElementById('unified-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendToAll();
      }
    });

    /* ── Focus input on load ── */
    window.addEventListener('load', function() {
      document.getElementById('unified-input').focus();
    });
  </script>
</body>
</html>
